<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .marquee-container {
      overflow: hidden;
      white-space: nowrap;
      background: #f0f0f0;
      padding: 10px;
    }
    .marquee-text {
      display: inline-block;
      animation: modernScroll 10s linear infinite;
    }
    @keyframes modernScroll {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

  <div class="marquee-container">
    <div class="marquee-text">This is a modern, accessible CSS marquee.</div>
  </div>

</body>
</html>
